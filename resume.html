<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume - Nicholas Sayed</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    body { 
        margin: 0; 
        font-family: Arial, sans-serif; 
        background: #dcdcdc; 
    }

    .container { 
        display: flex; 
        width: 95%; 
        margin: 20px auto; 
        min-height: 90vh; 
        background: #f9f9f9; 
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    
    /* Navigation Sidebar */
    .sidebar { 
        width: 60px; 
        background: #004a69; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding-top: 40px; 
        gap: 20px; 
        flex-shrink: 0;
    }

    .icon { 
        width: 100%; 
        height: 42px; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        color: #b0d4e3; 
        font-size: 20px; 
        text-decoration: none; 
        transition: all 0.3s ease; 
        border-left: 3px solid transparent; 
    }

    .icon:hover { 
        color: white; 
        background: rgba(255, 255, 255, 0.1); 
    }

    .icon.active { 
        color: white; 
        background: rgba(255, 255, 255, 0.2); 
        border-left: 3px solid #00aaff; 
    }

    /* Resume Content */
    .main-content { 
        flex: 1; 
        padding: 40px 80px; 
        color: #333; 
        overflow-y: auto; 
        height: 90vh; 
    }

    /* Page Label (RESUME) */
    .page-label {
        text-align: center;
        font-size: 14px;
        letter-spacing: 3px;
        color: #888;
        margin-bottom: 10px;
        text-transform: uppercase;
        font-weight: bold;
    }

    /* Header for Name and Contact */
    .resume-header {
        text-align: center;
        margin-bottom: 40px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 20px;
    }

    .resume-header h1 {
        margin: 0;
        font-size: 36px;
        color: #004a69;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .contact-bar {
        margin-top: 10px;
        font-size: 15px;
        color: #555;
    }

    .resume-section { margin-bottom: 35px; }
    
    .resume-section h2 { 
        color: #004
